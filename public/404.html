<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>LearnWithMe</title>
  <script>
    var l = window.location;
    var repo = '/learn-DE';
    var path = l.pathname;
    if (path.indexOf(repo) === 0) path = path.slice(repo.length);
    var redirect = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      repo + '/?p=' + encodeURIComponent(path) + (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') +
      l.hash;
    l.replace(redirect);
  </script>
</head>
<body></body>
</html>
